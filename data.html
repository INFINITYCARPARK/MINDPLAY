<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindPlay Admin • Pure Black</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* All existing styles remain exactly the same as before */
        /* (We keep the full CSS from the previous admin panel) */
        /* For brevity, we only show the new parts in this answer. */
        /* In your actual file, keep the complete CSS from the last admin panel. */
    </style>
</head>
<body>
    <!-- Login Overlay (same) -->
    <div class="login-overlay" id="loginOverlay">...</div>
    <!-- Forgot Modal (same) -->
    <div class="modal" id="forgotModal">...</div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel">
        <header class="admin-header">...</header>

        <div class="admin-container">
            <!-- Stats Cards (same) -->
            <div class="stats-grid">...</div>

            <!-- Tabs – now include Circuits and Components -->
            <div class="tabs">
                <div class="tab active" onclick="switchTab('projects')">Projects</div>
                <div class="tab" onclick="switchTab('circuits')">Circuits</div>
                <div class="tab" onclick="switchTab('components')">Components</div>
                <div class="tab" onclick="switchTab('skills')">Skills</div>
                <div class="tab" onclick="switchTab('messages')">Messages</div>
                <div class="tab" onclick="switchTab('profile')">Profile</div>
                <div class="tab" onclick="switchTab('settings')">Settings</div>
            </div>

            <!-- Projects Panel (same as before) -->
            <div id="projectsPanel" class="content-panel active">...</div>

            <!-- Circuits Panel (new) -->
            <div id="circuitsPanel" class="content-panel">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                    <h2 style="color:#fff;">Manage Circuits</h2>
                    <button class="login-btn" style="width:auto;" onclick="showAddCircuitForm()">+ Add Circuit</button>
                </div>

                <!-- Circuit Form -->
                <div id="circuitForm" style="display:none; background:#111; padding:1.5rem; border-radius:15px; margin-bottom:2rem; border:1px solid #333;">
                    <h3 style="color:#fff; margin-bottom:1rem;" id="circuitFormTitle">Add New Circuit</h3>
                    <div class="form-grid">
                        <div class="form-group"><label>Title</label><input type="text" id="circuitTitle"></div>
                        <div class="form-group"><label>Icon (Font Awesome)</label><input type="text" id="circuitIcon" value="fa-microchip"></div>
                        <div class="form-group"><label>Description</label><textarea id="circuitDesc"></textarea></div>
                    </div>

                    <!-- Images -->
                    <div class="form-group"><label>Image URLs</label><div id="circuitImagesContainer" class="array-field"></div><button type="button" class="add-item" onclick="addCircuitImage()">+ Add Image URL</button></div>

                    <!-- Files (schematic, etc.) -->
                    <div class="form-group"><label>Files (name + URL)</label><div id="circuitFilesContainer" class="array-field"></div><button type="button" class="add-item" onclick="addCircuitFile()">+ Add File</button></div>

                    <!-- Components used -->
                    <div class="form-group"><label>Components Used</label><div id="circuitComponentsContainer" class="array-field"></div><button type="button" class="add-item" onclick="addCircuitComponent()">+ Add Component</button></div>

                    <!-- Build Steps -->
                    <div class="form-group"><label>Design Steps</label><div id="circuitStepsContainer" class="array-field"></div><button type="button" class="add-item" onclick="addCircuitStep()">+ Add Step</button></div>

                    <div style="display:flex; gap:1rem; margin-top:1rem;">
                        <button class="login-btn" onclick="saveCircuit()">Save Circuit</button>
                        <button class="logout-btn" style="border-color:#666; color:#ccc;" onclick="cancelCircuitForm()">Cancel</button>
                    </div>
                </div>

                <!-- Circuits List -->
                <div id="circuitsList" class="projects-list"></div>
            </div>

            <!-- Components Panel (new) -->
            <div id="componentsPanel" class="content-panel">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                    <h2 style="color:#fff;">Manage Components</h2>
                    <button class="login-btn" style="width:auto;" onclick="showAddComponentForm()">+ Add Component</button>
                </div>

                <!-- Component Form -->
                <div id="componentForm" style="display:none; background:#111; padding:1.5rem; border-radius:15px; margin-bottom:2rem; border:1px solid #333;">
                    <h3 style="color:#fff; margin-bottom:1rem;" id="componentFormTitle">Add New Component</h3>
                    <div class="form-grid">
                        <div class="form-group"><label>Title</label><input type="text" id="componentTitle"></div>
                        <div class="form-group"><label>Icon (Font Awesome)</label><input type="text" id="componentIcon" value="fa-cube"></div>
                        <div class="form-group"><label>Description</label><textarea id="componentDesc"></textarea></div>
                    </div>

                    <!-- Images -->
                    <div class="form-group"><label>Image URLs</label><div id="componentImagesContainer" class="array-field"></div><button type="button" class="add-item" onclick="addComponentImage()">+ Add Image URL</button></div>

                    <!-- Datasheets / Files -->
                    <div class="form-group"><label>Files (name + URL)</label><div id="componentFilesContainer" class="array-field"></div><button type="button" class="add-item" onclick="addComponentFile()">+ Add File</button></div>

                    <!-- Specifications (name/value pairs) -->
                    <div class="form-group"><label>Specifications</label><div id="componentSpecsContainer" class="array-field"></div><button type="button" class="add-item" onclick="addComponentSpec()">+ Add Specification</button></div>

                    <div style="display:flex; gap:1rem; margin-top:1rem;">
                        <button class="login-btn" onclick="saveComponent()">Save Component</button>
                        <button class="logout-btn" style="border-color:#666; color:#ccc;" onclick="cancelComponentForm()">Cancel</button>
                    </div>
                </div>

                <!-- Components List -->
                <div id="componentsList" class="projects-list"></div>
            </div>

            <!-- Skills Panel (same) -->
            <div id="skillsPanel" class="content-panel">...</div>

            <!-- Messages Panel (same) -->
            <div id="messagesPanel" class="content-panel">...</div>

            <!-- Profile Panel (same) -->
            <div id="profilePanel" class="content-panel">...</div>

            <!-- Settings Panel (add delete all for circuits and components) -->
            <div id="settingsPanel" class="content-panel">
                <h2 style="color:#fff; margin-bottom:1rem;">Admin Settings</h2>
                <div style="max-width:500px;">
                    <div class="form-group"><label>Current Password</label><input type="password" id="currentPwd"></div>
                    <div class="form-group"><label>New Password</label><input type="password" id="newPwd"></div>
                    <div class="form-group"><label>Confirm New Password</label><input type="password" id="confirmPwd"></div>
                    <button class="login-btn" onclick="changePassword()">Change Password</button>
                </div>

                <!-- Danger Zone -->
                <div class="danger-zone">
                    <h3><i class="fas fa-exclamation-triangle"></i> Danger Zone</h3>
                    <p style="color:#aaa; margin-bottom:1rem;">These actions are irreversible.</p>
                    <button class="danger-btn" onclick="deleteAllProjects()">Delete All Projects</button>
                    <button class="danger-btn" onclick="deleteAllCircuits()" style="margin-left:1rem;">Delete All Circuits</button>
                    <button class="danger-btn" onclick="deleteAllComponents()" style="margin-left:1rem;">Delete All Components</button>
                </div>
            </div>
        </div>

        <footer class="admin-footer">...</footer>
    </div>

    <script>
        // ---------- SECURITY (same as before) ----------
        // ... (keep all existing security code: login, logout, session, etc.)

        // ---------- PROJECTS (same) ----------
        // ...

        // ---------- CIRCUITS MANAGEMENT ----------
        let circuits = [];
        let editingCircuitId = null;

        function loadCircuits() {
            const stored = localStorage.getItem('mindplay_circuits');
            circuits = stored ? JSON.parse(stored) : [];
            renderCircuitsList();
        }

        function renderCircuitsList() {
            const list = document.getElementById('circuitsList');
            if (circuits.length === 0) {
                list.innerHTML = '<p style="color:#666; text-align:center;">No circuits yet. Add one!</p>';
                return;
            }
            list.innerHTML = circuits.map(c => `
                <div class="project-admin-card">
                    <div class="project-admin-img"><i class="fas ${c.icon || 'fa-microchip'}"></i></div>
                    <div class="project-admin-info">
                        <h4>${c.title}</h4>
                        <p>${c.description.substring(0,80)}...</p>
                        <div class="project-admin-actions">
                            <button class="delete-btn" onclick="editCircuit('${c.id}')"><i class="fas fa-edit"></i> Edit</button>
                            <button class="delete-btn" onclick="deleteCircuit('${c.id}')"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function showAddCircuitForm() {
            editingCircuitId = null;
            document.getElementById('circuitFormTitle').innerText = 'Add New Circuit';
            document.getElementById('circuitTitle').value = '';
            document.getElementById('circuitIcon').value = 'fa-microchip';
            document.getElementById('circuitDesc').value = '';
            document.getElementById('circuitImagesContainer').innerHTML = '';
            document.getElementById('circuitFilesContainer').innerHTML = '';
            document.getElementById('circuitComponentsContainer').innerHTML = '';
            document.getElementById('circuitStepsContainer').innerHTML = '';
            document.getElementById('circuitForm').style.display = 'block';
        }

        function cancelCircuitForm() {
            document.getElementById('circuitForm').style.display = 'none';
        }

        function saveCircuit() {
            const title = document.getElementById('circuitTitle').value.trim();
            if (!title) return alert('Title required');
            const images = Array.from(document.querySelectorAll('#circuitImagesContainer input')).map(inp => inp.value).filter(v => v);
            const files = [];
            document.querySelectorAll('#circuitFilesContainer .array-item').forEach(item => {
                const name = item.querySelector('input[placeholder*="File name"]')?.value;
                const url = item.querySelector('input[placeholder*="URL"]')?.value;
                if (name && url) files.push({ name, url });
            });
            const components = [];
            document.querySelectorAll('#circuitComponentsContainer .array-item').forEach(item => {
                const name = item.querySelector('input[placeholder*="Component name"]')?.value;
                const desc = item.querySelector('input[placeholder*="Description"]')?.value;
                if (name) components.push({ name, description: desc || '' });
            });
            const steps = Array.from(document.querySelectorAll('#circuitStepsContainer input')).map(inp => inp.value).filter(v => v);

            const circuitData = {
                id: editingCircuitId || 'c' + Date.now() + Math.random().toString(36).substr(2,5),
                title: title,
                description: document.getElementById('circuitDesc').value.trim(),
                icon: document.getElementById('circuitIcon').value.trim() || 'fa-microchip',
                images: images,
                files: files,
                components: components,
                buildSteps: steps
            };

            if (editingCircuitId) {
                const index = circuits.findIndex(c => c.id === editingCircuitId);
                if (index !== -1) circuits[index] = circuitData;
            } else {
                circuits.push(circuitData);
            }

            localStorage.setItem('mindplay_circuits', JSON.stringify(circuits));
            cancelCircuitForm();
            renderCircuitsList();
        }

        function deleteCircuit(id) {
            if (confirm('Delete this circuit?')) {
                circuits = circuits.filter(c => c.id !== id);
                localStorage.setItem('mindplay_circuits', JSON.stringify(circuits));
                renderCircuitsList();
            }
        }

        function editCircuit(id) {
            const c = circuits.find(c => c.id === id);
            if (!c) return;
            editingCircuitId = id;
            document.getElementById('circuitFormTitle').innerText = 'Edit Circuit';
            document.getElementById('circuitTitle').value = c.title;
            document.getElementById('circuitIcon').value = c.icon;
            document.getElementById('circuitDesc').value = c.description;

            document.getElementById('circuitImagesContainer').innerHTML = (c.images || []).map(img => `
                <div class="array-item"><input type="url" value="${img}" placeholder="Image URL"><i class="fas fa-times remove-item" onclick="this.parentElement.remove()"></i></div>
            `).join('');
            document.getElementById('circuitFilesContainer').innerHTML = (c.files || []).map(f => `
                <div class="array-item"><input type="text" value="${f.name}" placeholder="File name"><input type="url" value="${f.url}" placeholder="URL"><i class="fas fa-times remove-item" onclick="this.parentElement.remove()"></i></div>
            `).join('');
            document.getElementById('circuitComponentsContainer').innerHTML = (c.components || []).map(comp => `
                <div class="array-item"><input type="text" value="${comp.name}" placeholder="Component name"><input type="text" value="${comp.description}" placeholder="Description"><i class="fas fa-times remove-item" onclick="this.parentElement.remove()"></i></div>
            `).join('');
            document.getElementById('circuitStepsContainer').innerHTML = (c.buildSteps || []).map(step => `
                <div class="array-item"><input type="text" value="${step}" placeholder="Step description"><i class="fas fa-times remove-item" onclick="this.parentElement.remove()"></i></div>
            `).join('');

            document.getElementById('circuitForm').style.display = 'block';
        }

        // Array helpers for circuits
        function addCircuitImage() {
            const div = document.createElement('div'); div.className = 'array-item';
            div.innerHTML = `<input type="url" placeholder="Image URL"><i class="fas fa-times remove-item" onclick="this.parentElement.remove()"></i>`;
            document.getElementById('circuitImagesContainer').appendChild(div);
        }
        function addCircuitFile() {
            const div = document.createElement('div'); div.className = 'array-item';
            div.innerHTML = `<input type="text" placeholder="File name"><input type="url" placeholder="URL"><i class="fas fa-times remove-item" onclick="this.parentElement.remove()"></i>`;
            document.getElementById('circuitFilesContainer').appendChild(div);
        }
        function addCircuitComponent() {
            const div = document.createElement('div'); div.className = 'array-item';
            div.innerHTML = `<input type="text" placeholder="Component name"><input type="text" placeholder="Description"><i class="fas fa-times remove-item" onclick="this.parentElement.remove()"></i>`;
            document.getElementById('circuitComponentsContainer').appendChild(div);
        }
        function addCircuitStep() {
            const div = document.createElement('div'); div.className = 'array-item';
            div.innerHTML = `<input type="text" placeholder="Step description"><i class="fas fa-times remove-item" onclick="this.parentElement.remove()"></i>`;
            document.getElementById('circuitStepsContainer').appendChild(div);
        }

        // ---------- COMPONENTS MANAGEMENT ----------
        let components = [];
        let editingComponentId = null;

        function loadComponents() {
            const stored = localStorage.getItem('mindplay_components');
            components = stored ? JSON.parse(stored) : [];
            renderComponentsList();
        }

        function renderComponentsList() {
            const list = document.getElementById('componentsList');
            if (components.length === 0) {
                list.innerHTML = '<p style="color:#666; text-align:center;">No components yet. Add one!</p>';
                return;
            }
            list.innerHTML = components.map(c => `
                <div class="project-admin-card">
                    <div class="project-admin-img"><i class="fas ${c.icon || 'fa-cube'}"></i></div>
                    <div class="project-admin-info">
                        <h4>${c.title}</h4>
                        <p>${c.description.substring(0,80)}...</p>
                        <div class="project-admin-actions">
                            <button class="delete-btn" onclick="editComponent('${c.id}')"><i class="fas fa-edit"></i> Edit</button>
                            <button class="delete-btn" onclick="deleteComponent('${c.id}')"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function showAddComponentForm() {
            editingComponentId = null;
            document.getElementById('componentFormTitle').innerText = 'Add New Component';
            document.getElementById('componentTitle').value = '';
            document.getElementById('componentIcon').value = 'fa-cube';
            document.getElementById('componentDesc').value = '';
            document.getElementById('componentImagesContainer').innerHTML = '';
            document.getElementById('componentFilesContainer').innerHTML = '';
            document.getElementById('componentSpecsContainer').innerHTML = '';
            document.getElementById('componentForm').style.display = 'block';
        }

        function cancelComponentForm() {
            document.getElementById('componentForm').style.display = 'none';
        }

        function saveComponent() {
            const title = document.getElementById('componentTitle').value.trim();
            if (!title) return alert('Title required');
            const images = Array.from(document.querySelectorAll('#componentImagesContainer input')).map(inp => inp.value).filter(v => v);
            const files = [];
            document.querySelectorAll('#componentFilesContainer .array-item').forEach(item => {
                const name = item.querySelector('input[placeholder*="File name"]')?.value;
                const url = item.querySelector('input[placeholder*="URL"]')?.value;
                if (name && url) files.push({ name, url });
            });
            const specs = [];
            document.querySelectorAll('#componentSpecsContainer .array-item').forEach(item => {
                const name = item.querySelector('input[placeholder*="Spec name"]')?.value;
                const value = item.querySelector('input[placeholder*="Spec value"]')?.value;
                if (name) specs.push({ name, value: value || '' });
            });

            const componentData = {
                id: editingComponentId || 'comp' + Date.now() + Math.random().toString(36).substr(2,5),
                title: title,
                description: document.getElementById('componentDesc').value.trim(),
                icon: document.getElementById('componentIcon').value.trim() || 'fa-cube',
                images: images,
                files: files,
                specs: specs
            };

            if (editingComponentId) {
                const index = components.findIndex(c => c.id === editingComponentId);
                if (index !== -1) components[index] = componentData;
            } else {
                components.push(componentData);
            }

            localStorage.setItem('mindplay_components', JSON.stringify(components));
            cancelComponentForm();
            renderComponentsList();
        }

        function deleteComponent(id) {
            if (confirm('Delete this component?')) {
                components = components.filter(c => c.id !== id);
                localStorage.setItem('mindplay_components', JSON.stringify(components));
                renderComponentsList();
            }
        }

        function editComponent(id) {
            const c = components.find(c => c.id === id);
            if (!c) return;
            editingComponentId = id;
            document.getElementById('componentFormTitle').innerText = 'Edit Component';
            document.getElementById('componentTitle').value = c.title;
            document.getElementById('componentIcon').value = c.icon;
            document.getElementById('componentDesc').value = c.description;

            document.getElementById('componentImagesContainer').innerHTML = (c.images || []).map(img => `
                <div class="array-item"><input type="url" value="${img}" placeholder="Image URL"><i class="fas fa-times remove-item" onclick="this.parentElement.remove()"></i></div>
            `).join('');
            document.getElementById('componentFilesContainer').innerHTML = (c.files || []).map(f => `
                <div class="array-item"><input type="text" value="${f.name}" placeholder="File name"><input type="url" value="${f.url}" placeholder="URL"><i class="fas fa-times remove-item" onclick="this.parentElement.remove()"></i></div>
            `).join('');
            document.getElementById('componentSpecsContainer').innerHTML = (c.specs || []).map(s => `
                <div class="array-item"><input type="text" value="${s.name}" placeholder="Spec name"><input type="text" value="${s.value}" placeholder="Spec value"><i class="fas fa-times remove-item" onclick="this.parentElement.remove()"></i></div>
            `).join('');

            document.getElementById('componentForm').style.display = 'block';
        }

        // Array helpers for components
        function addComponentImage() {
            const div = document.createElement('div'); div.className = 'array-item';
            div.innerHTML = `<input type="url" placeholder="Image URL"><i class="fas fa-times remove-item" onclick="this.parentElement.remove()"></i>`;
            document.getElementById('componentImagesContainer').appendChild(div);
        }
        function addComponentFile() {
            const div = document.createElement('div'); div.className = 'array-item';
            div.innerHTML = `<input type="text" placeholder="File name"><input type="url" placeholder="URL"><i class="fas fa-times remove-item" onclick="this.parentElement.remove()"></i>`;
            document.getElementById('componentFilesContainer').appendChild(div);
        }
        function addComponentSpec() {
            const div = document.createElement('div'); div.className = 'array-item';
            div.innerHTML = `<input type="text" placeholder="Spec name"><input type="text" placeholder="Spec value"><i class="fas fa-times remove-item" onclick="this.parentElement.remove()"></i>`;
            document.getElementById('componentSpecsContainer').appendChild(div);
        }

        // Danger Zone: Delete All Circuits & Components
        function deleteAllCircuits() {
            if (confirm('⚠️ Delete ALL circuits? This cannot be undone.')) {
                circuits = [];
                localStorage.setItem('mindplay_circuits', JSON.stringify(circuits));
                renderCircuitsList();
            }
        }
        function deleteAllComponents() {
            if (confirm('⚠️ Delete ALL components? This cannot be undone.')) {
                components = [];
                localStorage.setItem('mindplay_components', JSON.stringify(components));
                renderComponentsList();
            }
        }

        // Update tab switching to include new panels
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
            if (tab === 'projects') {
                document.querySelector('.tab').classList.add('active');
                document.getElementById('projectsPanel').classList.add('active');
            } else if (tab === 'circuits') {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('circuitsPanel').classList.add('active');
                loadCircuits();
            } else if (tab === 'components') {
                document.querySelectorAll('.tab')[2].classList.add('active');
                document.getElementById('componentsPanel').classList.add('active');
                loadComponents();
            } else if (tab === 'skills') {
                document.querySelectorAll('.tab')[3].classList.add('active');
                document.getElementById('skillsPanel').classList.add('active');
                loadSkills();
            } else if (tab === 'messages') {
                document.querySelectorAll('.tab')[4].classList.add('active');
                document.getElementById('messagesPanel').classList.add('active');
            } else if (tab === 'profile') {
                document.querySelectorAll('.tab')[5].classList.add('active');
                document.getElementById('profilePanel').classList.add('active');
            } else if (tab === 'settings') {
                document.querySelectorAll('.tab')[6].classList.add('active');
                document.getElementById('settingsPanel').classList.add('active');
            }
        }

        // Update loadDashboardData to load all
        function loadDashboardData() {
            loadProjects();
            loadCircuits();
            loadComponents();
            loadSkills();
            document.getElementById('totalMessages').innerText = '0';
            document.getElementById('totalVisitors').innerText = '0';
        }

        // Keep all existing functions (login, logout, projects, skills, profile, etc.)
        // ...
    </script>
</body>
</html>
