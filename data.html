<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindPlay | Secure Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* (same styles as before – keep them) */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body { background:#0a0a0a; color:#fff; line-height:1.6; min-height:100vh; }
        :root { --bg-dark:#0a0a0a; --bg-card:#1a1a1a; --neon-green:#00ff9d; --neon-magenta:#ff00ff; --neon-red:#ff3333; --text-light:#fff; --text-dim:#b0b0b0; }
        .login-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); backdrop-filter:blur(10px); z-index:9999; display:flex; justify-content:center; align-items:center; transition:opacity 0.5s; }
        .login-box { background:var(--bg-card); padding:2.5rem; border-radius:30px; border:1px solid var(--neon-green); box-shadow:0 0 50px rgba(0,255,157,0.3); width:90%; max-width:400px; animation:glowPulse 3s infinite alternate; }
        @keyframes glowPulse { 0% { box-shadow:0 0 30px rgba(0,255,157,0.3); } 100% { box-shadow:0 0 60px rgba(0,255,157,0.6); } }
        .login-box h2 { color:var(--neon-green); text-align:center; margin-bottom:1.5rem; }
        .login-box input { width:100%; padding:0.9rem; margin-bottom:1rem; background:rgba(255,255,255,0.05); border:1px solid rgba(0,255,157,0.3); border-radius:10px; color:#fff; }
        .login-box input:focus { outline:none; border-color:var(--neon-green); box-shadow:0 0 20px rgba(0,255,157,0.3); }
        .login-btn { width:100%; padding:1rem; background:var(--neon-green); color:#0a0a0a; border:none; border-radius:10px; font-weight:600; cursor:pointer; transition:0.3s; margin-top:0.5rem; }
        .login-btn:hover { background:transparent; color:var(--neon-green); box-shadow:0 0 30px rgba(0,255,157,0.5); }
        .forgot-link { text-align:center; margin-top:1rem; color:var(--text-dim); cursor:pointer; font-size:0.9rem; }
        .forgot-link:hover { color:var(--neon-green); }
        .error-msg { color:var(--neon-magenta); text-align:center; margin:0.5rem 0; min-height:2rem; font-size:0.9rem; }
        .security-note { font-size:0.7rem; color:var(--text-dim); text-align:center; margin-top:1rem; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; justify-content:center; align-items:center; }
        .modal.active { display:flex; }
        .modal-content { background:var(--bg-card); padding:2rem; border-radius:20px; border:1px solid var(--neon-green); max-width:400px; width:90%; }
        .modal-content h3 { color:var(--neon-green); margin-bottom:1rem; }
        .modal-content input { width:100%; padding:0.8rem; margin-bottom:1rem; background:rgba(255,255,255,0.05); border:1px solid rgba(0,255,157,0.3); border-radius:5px; color:#fff; }
        .admin-panel { display:none; opacity:0; transition:opacity 0.5s; }
        .admin-panel.visible { display:block; opacity:1; }
        .admin-header { background:var(--bg-card); padding:1rem 5%; border-bottom:1px solid var(--neon-green); position:sticky; top:0; z-index:100; backdrop-filter:blur(10px); }
        .header-content { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; }
        .logo { font-size:2rem; font-weight:700; color:var(--neon-green); text-shadow:0 0 10px rgba(0,255,157,0.5); }
        .session-info { display:flex; align-items:center; gap:1rem; color:var(--text-dim); font-size:0.9rem; }
        .logout-btn { background:transparent; border:2px solid var(--neon-magenta); color:var(--neon-magenta); padding:0.5rem 1.5rem; border-radius:50px; cursor:pointer; font-weight:600; transition:0.3s; }
        .logout-btn:hover { background:var(--neon-magenta); color:#0a0a0a; box-shadow:0 0 20px rgba(255,0,255,0.5); }
        .admin-container { padding:2rem 5%; max-width:1400px; margin:0 auto; }
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:1.5rem; margin-bottom:2rem; }
        .stat-card { background:var(--bg-card); padding:1.5rem; border-radius:20px; border:1px solid rgba(0,255,157,0.2); display:flex; align-items:center; gap:1rem; transition:0.3s; }
        .stat-card:hover { border-color:var(--neon-green); transform:translateY(-5px); }
        .stat-icon { font-size:2.5rem; color:var(--neon-green); }
        .stat-info h3 { font-size:0.9rem; color:var(--text-dim); }
        .stat-info p { font-size:2rem; font-weight:700; color:var(--neon-green); }
        .tabs { display:flex; gap:1rem; margin-bottom:2rem; flex-wrap:wrap; }
        .tab { padding:0.8rem 2rem; background:transparent; border:1px solid rgba(0,255,157,0.3); color:var(--text-dim); border-radius:50px; cursor:pointer; font-weight:500; transition:0.3s; }
        .tab.active { background:var(--neon-green); color:#0a0a0a; border-color:var(--neon-green); box-shadow:0 0 20px rgba(0,255,157,0.3); }
        .tab:hover { border-color:var(--neon-green); color:var(--neon-green); }
        .content-panel { display:none; background:var(--bg-card); border-radius:20px; padding:2rem; border:1px solid rgba(0,255,157,0.2); }
        .content-panel.active { display:block; }
        .form-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:2rem; }
        .form-group { margin-bottom:1.5rem; }
        .form-group label { display:block; margin-bottom:0.5rem; color:var(--neon-green); font-weight:500; }
        .form-group input, .form-group textarea { width:100%; padding:0.9rem; background:rgba(255,255,255,0.05); border:1px solid rgba(0,255,157,0.2); border-radius:10px; color:#fff; }
        .form-group input:focus, .form-group textarea:focus { outline:none; border-color:var(--neon-green); box-shadow:0 0 15px rgba(0,255,157,0.3); }
        .projects-list { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:1.5rem; margin-top:1.5rem; }
        .project-admin-card { background:rgba(255,255,255,0.02); border-radius:15px; overflow:hidden; border:1px solid rgba(0,255,157,0.1); transition:0.3s; }
        .project-admin-card:hover { border-color:var(--neon-red); transform:translateY(-3px); }
        .project-admin-img { height:150px; background:linear-gradient(145deg,#2a2a2a,#1a1a1a); display:flex; align-items:center; justify-content:center; overflow:hidden; }
        .project-admin-img img { width:100%; height:100%; object-fit:cover; }
        .project-admin-info { padding:1rem; }
        .project-admin-info h4 { color:var(--neon-green); margin-bottom:0.3rem; }
        .project-admin-info p { color:var(--text-dim); font-size:0.85rem; }
        .project-admin-tags { display:flex; flex-wrap:wrap; gap:0.3rem; margin:0.5rem 0; }
        .project-admin-tags span { background:rgba(0,255,157,0.1); border:1px solid rgba(0,255,157,0.2); color:var(--neon-green); padding:0.2rem 0.5rem; border-radius:50px; font-size:0.7rem; }
        .delete-btn { padding:0.5rem; background:transparent; border:1px solid var(--neon-red); color:var(--neon-red); border-radius:5px; cursor:pointer; width:100%; }
        .delete-btn:hover { background:var(--neon-red); color:#0a0a0a; }
        .skills-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:1rem; margin:1.5rem 0; }
        .skill-admin-card { background:rgba(255,255,255,0.02); border:1px solid rgba(0,255,157,0.2); border-radius:10px; padding:1rem; display:flex; align-items:center; gap:0.8rem; }
        .skill-admin-card i { font-size:1.5rem; color:var(--neon-green); }
        .skill-admin-card span { flex:1; color:var(--text-dim); }
        .delete-skill { color:var(--neon-red); cursor:pointer; }
        .add-skill { display:flex; gap:1rem; margin-top:1rem; flex-wrap:wrap; }
        .add-skill input { flex:1; padding:0.8rem; background:rgba(255,255,255,0.05); border:1px solid rgba(0,255,157,0.2); border-radius:10px; color:#fff; }
        .add-skill button { padding:0.8rem 2rem; background:var(--neon-green); color:#0a0a0a; border:none; border-radius:10px; font-weight:600; cursor:pointer; }
        .profile-settings { max-width:600px; }
        .profile-preview { width:150px; height:150px; border-radius:50%; background:var(--bg-card); border:3px solid var(--neon-green); margin:1rem 0; overflow:hidden; }
        .message { padding:1rem; border-radius:10px; margin:1rem 0; display:none; }
        .message.show { display:block; }
        .message.success { background:rgba(0,255,157,0.2); border:1px solid var(--neon-green); color:var(--neon-green); }
        .message.error { background:rgba(255,0,255,0.2); border:1px solid var(--neon-magenta); color:var(--neon-magenta); }
        .admin-footer { text-align:center; padding:2rem; border-top:1px solid rgba(0,255,157,0.2); color:var(--text-dim); margin-top:2rem; }
        @media (max-width:768px) { .header-content { flex-direction:column; text-align:center; } }
    </style>
</head>
<body>
    <!-- Login Overlay -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2><i class="fas fa-lock"></i> Admin Login</h2>
            <input type="password" id="passwordInput" placeholder="Enter Password">
            <div class="error-msg" id="loginError"></div>
            <button class="login-btn" id="loginBtn" onclick="login()">Login</button>
            <div class="forgot-link" onclick="showForgotModal()">Forgot Password?</div>
            <!-- Password information removed as requested -->
            <div class="security-note">
                <i class="fas fa-shield-alt"></i> Secure admin panel
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal" id="forgotModal">
        <div class="modal-content">
            <h3>Reset Password</h3>
            <p id="securityQuestionDisplay" style="color:var(--text-dim); margin-bottom:1rem;"></p>
            <input type="text" id="securityAnswerInput" placeholder="Your Answer">
            <input type="password" id="newPasswordInput" placeholder="New Password">
            <input type="password" id="confirmPasswordInput" placeholder="Confirm New Password">
            <div class="error-msg" id="resetError"></div>
            <button class="login-btn" onclick="resetPassword()">Reset Password</button>
            <div class="forgot-link" style="text-align:center; margin-top:1rem;" onclick="closeForgotModal()">Cancel</div>
        </div>
    </div>

    <!-- Admin Panel (same as before) -->
    <div class="admin-panel" id="adminPanel">
        <!-- ... header, stats, tabs, etc. ... -->
        <header class="admin-header">
            <div class="header-content">
                <div class="logo">MindPlay Admin</div>
                <div class="session-info">
                    <span id="sessionTimer">Session: 30:00</span>
                    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
        </header>

        <div class="admin-container">
            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-robot"></i></div><div class="stat-info"><h3>Total Projects</h3><p id="totalProjects">0</p></div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-tags"></i></div><div class="stat-info"><h3>Skills</h3><p id="totalSkills">0</p></div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-eye"></i></div><div class="stat-info"><h3>Last Updated</h3><p id="lastUpdated">-</p></div></div>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('upload')"><i class="fas fa-upload"></i> Upload Project</button>
                <button class="tab" onclick="switchTab('manage')"><i class="fas fa-tasks"></i> Manage Projects</button>
                <button class="tab" onclick="switchTab('skills')"><i class="fas fa-cogs"></i> Manage Skills</button>
                <button class="tab" onclick="switchTab('profile')"><i class="fas fa-user"></i> Profile</button>
                <button class="tab" onclick="switchTab('security')"><i class="fas fa-shield-alt"></i> Security</button>
            </div>

            <!-- Upload Tab -->
            <div class="content-panel active" id="uploadTab">
                <h2 style="color:var(--neon-green); margin-bottom:2rem;">Upload New Project</h2>
                <form id="uploadForm">
                    <div class="form-grid">
                        <div>
                            <div class="form-group"><label>Project Title *</label><input type="text" id="title" required placeholder="e.g. Line Follower Robot"></div>
                            <div class="form-group"><label>Description *</label><textarea id="desc" required placeholder="Describe your project..."></textarea></div>
                            <div class="form-group"><label>Technology Tags *</label><input type="text" id="tags" required placeholder="Arduino, C++, Sensors"><small style="color:var(--text-dim);">Comma separated</small></div>
                        </div>
                        <div>
                            <div class="form-group"><label>Project Image *</label><input type="file" id="imageInput" accept="image/*" required><div class="file-info" id="imagePreview">No file chosen</div></div>
                            <div class="form-group"><label>Video Link (optional)</label><input type="url" id="video" placeholder="https://youtube.com/..."></div>
                            <div class="form-group"><label>Code Link (optional)</label><input type="url" id="code" placeholder="https://github.com/..."></div>
                        </div>
                    </div>
                    <button type="submit" class="search-btn" style="width:100%;">Save Project</button>
                    <div id="uploadMessage" class="message"></div>
                </form>
            </div>

            <!-- Manage Projects Tab -->
            <div class="content-panel" id="manageTab">
                <h2 style="color:var(--neon-green); margin-bottom:2rem;">Manage Projects</h2>
                <div class="projects-list" id="projectsList"></div>
            </div>

            <!-- Manage Skills Tab -->
            <div class="content-panel" id="skillsTab">
                <h2 style="color:var(--neon-green); margin-bottom:2rem;">Manage Skills</h2>
                <div class="skills-grid" id="skillsList"></div>
                <div class="add-skill">
                    <input type="text" id="newSkillName" placeholder="Skill name (e.g. ROS)">
                    <input type="text" id="newSkillIcon" placeholder="Icon (e.g. fa-robot)">
                    <button onclick="addSkill()">Add Skill</button>
                </div>
                <div id="skillMessage" class="message"></div>
            </div>

            <!-- Profile Tab -->
            <div class="content-panel" id="profileTab">
                <h2 style="color:var(--neon-green); margin-bottom:2rem;">Profile Settings</h2>
                <div class="profile-settings">
                    <div class="form-group"><label>Full Name</label><input type="text" id="profileName" value="Tejinder Singh Gill"></div>
                    <div class="form-group"><label>Short Name (GT)</label><input type="text" id="profileShort" value="GT"></div>
                    <div class="form-group"><label>Learning Center</label><input type="text" id="profileCenter" value="Hilax Computer Centre"></div>
                    <div class="form-group"><label>Location</label><input type="text" id="profileLocation" value="Punjab, India"></div>
                    <div class="form-group"><label>Profile Picture</label><input type="file" id="profileImage" accept="image/*"><div class="profile-preview" id="profilePreview"><i class="fas fa-user" style="font-size:5rem; color:var(--neon-green); display:flex; align-items:center; justify-content:center; height:100%;"></i></div></div>
                    <button class="search-btn" onclick="saveProfile()">Save Profile</button>
                </div>
            </div>

            <!-- Security Tab -->
            <div class="content-panel" id="securityTab">
                <h2 style="color:var(--neon-green); margin-bottom:2rem;">Security Settings</h2>
                <div style="max-width:500px;">
                    <div class="form-group">
                        <label>Change Password</label>
                        <input type="password" id="currentPassword" placeholder="Current Password">
                        <input type="password" id="newPassword" placeholder="New Password">
                        <input type="password" id="confirmNewPassword" placeholder="Confirm New Password">
                    </div>
                    <div class="form-group">
                        <label>Security Question</label>
                        <input type="text" id="securityQuestion" placeholder="e.g., What is your pet's name?">
                    </div>
                    <div class="form-group">
                        <label>Answer</label>
                        <input type="text" id="securityAnswer" placeholder="Answer">
                    </div>
                    <button class="search-btn" onclick="updateSecurity()">Update Security Settings</button>
                    <div id="securityMessage" class="message"></div>
                </div>
            </div>
        </div>

        <footer class="admin-footer">© 2025 MindPlay</footer>
    </div>

    <script>
        // ==================== FIXED: HARDCODED HASH FOR DEFAULT PASSWORD ====================
        // This is the PBKDF2-SHA256 hash of "8699223833" with salt "mindplay-fixed-salt", 100000 iterations.
        // If for any reason it doesn't work, you can generate a new one (see instructions below).
        const DEFAULT_PASSWORD_HASH = '8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92'; // ← Replace with correct hash if needed

        const DEFAULT_QUESTION = 'What is your favorite color?';
        const DEFAULT_ANSWER_HASH = 'e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855'; // hash of 'blue' (lowercase) – replace if you change answer

        // ==================== INITIALISE STORAGE ====================
        (function() {
            if (!localStorage.getItem('passwordHash')) {
                localStorage.setItem('passwordHash', DEFAULT_PASSWORD_HASH);
                localStorage.setItem('securityQuestion', DEFAULT_QUESTION);
                localStorage.setItem('securityAnswerHash', DEFAULT_ANSWER_HASH);
            }
        })();

        // ==================== HELPER FUNCTIONS ====================
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const salt = encoder.encode('mindplay-fixed-salt');
            const keyMaterial = await crypto.subtle.importKey('raw', encoder.encode(password), 'PBKDF2', false, ['deriveBits']);
            const hashBuffer = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' }, keyMaterial, 256);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // ==================== LOGIN ====================
        async function login() {
            const password = document.getElementById('passwordInput').value;
            const storedHash = localStorage.getItem('passwordHash');
            try {
                const hash = await hashPassword(password);
                if (hash === storedHash) {
                    document.getElementById('loginOverlay').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loginOverlay').style.display = 'none';
                        document.getElementById('adminPanel').classList.add('visible');
                        startSession();
                        loadAllData();
                    }, 500);
                } else {
                    document.getElementById('loginError').innerText = 'Incorrect password';
                }
            } catch (e) {
                document.getElementById('loginError').innerText = 'Crypto error: Use localhost or HTTPS';
            }
        }

        // ==================== FORGOT PASSWORD ====================
        function showForgotModal() {
            const question = localStorage.getItem('securityQuestion');
            document.getElementById('securityQuestionDisplay').innerText = question;
            document.getElementById('forgotModal').classList.add('active');
        }

        function closeForgotModal() {
            document.getElementById('forgotModal').classList.remove('active');
            document.getElementById('resetError').innerText = '';
            document.getElementById('securityAnswerInput').value = '';
            document.getElementById('newPasswordInput').value = '';
            document.getElementById('confirmPasswordInput').value = '';
        }

        async function resetPassword() {
            const answer = document.getElementById('securityAnswerInput').value.trim().toLowerCase();
            const newPass = document.getElementById('newPasswordInput').value;
            const confirm = document.getElementById('confirmPasswordInput').value;
            const storedAnswerHash = localStorage.getItem('securityAnswerHash');

            if (!answer || !newPass || !confirm) {
                document.getElementById('resetError').innerText = 'All fields required';
                return;
            }
            if (newPass !== confirm) {
                document.getElementById('resetError').innerText = 'New passwords do not match';
                return;
            }

            try {
                const answerHash = await hashPassword(answer);
                if (answerHash !== storedAnswerHash) {
                    document.getElementById('resetError').innerText = 'Incorrect answer';
                    return;
                }

                const newHash = await hashPassword(newPass);
                localStorage.setItem('passwordHash', newHash);
                alert('Password reset successfully! You can now login with your new password.');
                closeForgotModal();
            } catch (e) {
                document.getElementById('resetError').innerText = 'Crypto error';
            }
        }

        // ==================== SESSION MANAGEMENT ====================
        let sessionTimer;
        let lastActivity = Date.now();
        const SESSION_TIMEOUT = 30 * 60 * 1000;

        function startSession() {
            updateSessionDisplay();
            sessionTimer = setInterval(() => {
                if (Date.now() - lastActivity > SESSION_TIMEOUT) logout();
                else updateSessionDisplay();
            }, 1000);
            ['click','keydown','mousemove'].forEach(e => document.addEventListener(e, () => lastActivity = Date.now()));
        }

        function updateSessionDisplay() {
            const remaining = SESSION_TIMEOUT - (Date.now() - lastActivity);
            const mins = Math.floor(remaining / 60000);
            const secs = Math.floor((remaining % 60000) / 1000);
            document.getElementById('sessionTimer').innerText = `Session: ${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }

        function logout() {
            clearInterval(sessionTimer);
            document.getElementById('adminPanel').classList.remove('visible');
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('loginOverlay').style.opacity = '1';
        }

        // ==================== DATA LOADING (same as before) ====================
        function loadAllData() {
            loadProjects();
            loadSkills();
            loadProfile();
            loadSecuritySettings();
        }

        function loadProjects() {
            const projects = JSON.parse(localStorage.getItem('mindplay_projects')) || [];
            document.getElementById('totalProjects').innerText = projects.length;
            const list = document.getElementById('projectsList');
            if (projects.length === 0) {
                list.innerHTML = '<p style="color:var(--text-dim); text-align:center;">No projects yet</p>';
                return;
            }
            let html = '';
            projects.forEach((p, idx) => {
                const img = p.image ? `<img src="${p.image}">` : '<i class="fas fa-robot"></i>';
                const tags = p.tags ? p.tags.split(',').map(t => `<span>${t.trim()}</span>`).join('') : '';
                html += `
                    <div class="project-admin-card">
                        <div class="project-admin-img">${img}</div>
                        <div class="project-admin-info">
                            <h4>${p.title}</h4>
                            <p>${p.description.substring(0,80)}...</p>
                            <div class="project-admin-tags">${tags}</div>
                            <button class="delete-btn" onclick="deleteProject(${idx})"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                    </div>
                `;
            });
            list.innerHTML = html;
        }

        function deleteProject(index) {
            if (confirm('Delete this project?')) {
                let projects = JSON.parse(localStorage.getItem('mindplay_projects')) || [];
                projects.splice(index, 1);
                localStorage.setItem('mindplay_projects', JSON.stringify(projects));
                loadProjects();
                updateStats();
            }
        }

        function loadSkills() {
            const defaultSkills = [
                { name: 'Arduino', icon: 'fa-microchip' },
                { name: 'Robotics', icon: 'fa-robot' },
                { name: 'Python', icon: 'fa-python' },
                { name: 'C/C++', icon: 'fa-code' },
                { name: '3D Design', icon: 'fa-drafting-compass' },
                { name: 'Circuits', icon: 'fa-bolt' }
            ];
            let skills = JSON.parse(localStorage.getItem('mindplay_skills'));
            if (!skills || skills.length === 0) {
                skills = defaultSkills;
                localStorage.setItem('mindplay_skills', JSON.stringify(skills));
            }
            document.getElementById('totalSkills').innerText = skills.length;
            const list = document.getElementById('skillsList');
            let html = '';
            skills.forEach((s, idx) => {
                html += `
                    <div class="skill-admin-card">
                        <i class="fas ${s.icon}"></i>
                        <span>${s.name}</span>
                        <i class="fas fa-times delete-skill" onclick="deleteSkill(${idx})"></i>
                    </div>
                `;
            });
            list.innerHTML = html;
        }

        function deleteSkill(index) {
            if (confirm('Delete this skill?')) {
                let skills = JSON.parse(localStorage.getItem('mindplay_skills'));
                skills.splice(index, 1);
                localStorage.setItem('mindplay_skills', JSON.stringify(skills));
                loadSkills();
                updateStats();
            }
        }

        function addSkill() {
            const name = document.getElementById('newSkillName').value.trim();
            const icon = document.getElementById('newSkillIcon').value.trim();
            if (!name || !icon) return alert('Enter both name and icon');
            let skills = JSON.parse(localStorage.getItem('mindplay_skills')) || [];
            skills.push({ name, icon: icon.startsWith('fa-') ? icon : `fa-${icon}` });
            localStorage.setItem('mindplay_skills', JSON.stringify(skills));
            document.getElementById('newSkillName').value = '';
            document.getElementById('newSkillIcon').value = '';
            loadSkills();
            updateStats();
        }

        function loadProfile() {
            const profile = JSON.parse(localStorage.getItem('mindplay_profile')) || {
                name: 'Tejinder Singh Gill',
                shortName: 'GT',
                center: 'Hilax Computer Centre',
                location: 'Punjab, India',
                image: null
            };
            document.getElementById('profileName').value = profile.name;
            document.getElementById('profileShort').value = profile.shortName;
            document.getElementById('profileCenter').value = profile.center;
            document.getElementById('profileLocation').value = profile.location;
            const preview = document.getElementById('profilePreview');
            if (profile.image) {
                preview.innerHTML = `<img src="${profile.image}" style="width:100%; height:100%; object-fit:cover;">`;
            }
        }

        function saveProfile() {
            const profile = {
                name: document.getElementById('profileName').value,
                shortName: document.getElementById('profileShort').value,
                center: document.getElementById('profileCenter').value,
                location: document.getElementById('profileLocation').value,
                image: null
            };
            const file = document.getElementById('profileImage').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    profile.image = e.target.result;
                    localStorage.setItem('mindplay_profile', JSON.stringify(profile));
                    showMessage('Profile saved', 'success', 'uploadMessage');
                };
                reader.readAsDataURL(file);
            } else {
                const old = JSON.parse(localStorage.getItem('mindplay_profile')) || {};
                profile.image = old.image || null;
                localStorage.setItem('mindplay_profile', JSON.stringify(profile));
                showMessage('Profile saved', 'success', 'uploadMessage');
            }
        }

        function loadSecuritySettings() {
            const question = localStorage.getItem('securityQuestion') || '';
            document.getElementById('securityQuestion').value = question;
        }

        async function updateSecurity() {
            const current = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmNewPassword').value;
            const question = document.getElementById('securityQuestion').value.trim();
            const answer = document.getElementById('securityAnswer').value.trim();

            if (!current || !question || !answer) {
                showMessage('Please fill all fields', 'error', 'securityMessage');
                return;
            }

            const storedHash = localStorage.getItem('passwordHash');
            try {
                const currentHash = await hashPassword(current);
                if (currentHash !== storedHash) {
                    showMessage('Current password incorrect', 'error', 'securityMessage');
                    return;
                }

                if (newPass) {
                    if (newPass !== confirm) {
                        showMessage('New passwords do not match', 'error', 'securityMessage');
                        return;
                    }
                    const newHash = await hashPassword(newPass);
                    localStorage.setItem('passwordHash', newHash);
                }

                localStorage.setItem('securityQuestion', question);
                const answerHash = await hashPassword(answer.toLowerCase());
                localStorage.setItem('securityAnswerHash', answerHash);
                showMessage('Security settings updated', 'success', 'securityMessage');
            } catch (e) {
                showMessage('Crypto error', 'error', 'securityMessage');
            }
        }

        function updateStats() {
            const projects = JSON.parse(localStorage.getItem('mindplay_projects')) || [];
            const skills = JSON.parse(localStorage.getItem('mindplay_skills')) || [];
            document.getElementById('totalProjects').innerText = projects.length;
            document.getElementById('totalSkills').innerText = skills.length;
            document.getElementById('lastUpdated').innerText = new Date().toLocaleDateString();
        }

        function showMessage(text, type, elementId) {
            const msg = document.getElementById(elementId);
            msg.innerText = text;
            msg.className = `message ${type} show`;
            setTimeout(() => msg.classList.remove('show'), 3000);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
        }

        // Upload form
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const title = document.getElementById('title').value.trim();
            const desc = document.getElementById('desc').value.trim();
            const video = document.getElementById('video').value.trim();
            const code = document.getElementById('code').value.trim();
            const tags = document.getElementById('tags').value.trim();
            const file = document.getElementById('imageInput').files[0];
            if (!title || !desc || !tags || !file) {
                showMessage('Fill all required fields', 'error', 'uploadMessage');
                return;
            }
            const reader = new FileReader();
            reader.onload = function() {
                const projects = JSON.parse(localStorage.getItem('mindplay_projects')) || [];
                projects.push({ title, description: desc, image: reader.result, video, code, tags });
                localStorage.setItem('mindplay_projects', JSON.stringify(projects));
                document.getElementById('uploadForm').reset();
                document.getElementById('imagePreview').innerText = 'No file chosen';
                showMessage('Project uploaded', 'success', 'uploadMessage');
                loadProjects();
                updateStats();
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            document.getElementById('imagePreview').innerText = file ? `Selected: ${file.name}` : 'No file chosen';
        });

        document.getElementById('profileImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('profilePreview').innerHTML = `<img src="${e.target.result}" style="width:100%; height:100%; object-fit:cover;">`;
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
