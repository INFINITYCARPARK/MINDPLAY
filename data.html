<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindPlay | Secure Admin</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0a0a0a;
    color:white;
}

.login-overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:#1a1a1a;
    padding:30px;
    border-radius:15px;
    width:300px;
    text-align:center;
    border:1px solid #00ff9d;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    background:#111;
    border:1px solid #00ff9d;
    color:white;
}

button{
    width:100%;
    padding:10px;
    background:#00ff9d;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

.error{
    color:#ff00ff;
    height:20px;
}

.admin-panel{
    display:none;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logout{
    background:#ff00ff;
    color:black;
    padding:5px 15px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <h2>Admin Login</h2>
        <input type="password" id="passwordInput" placeholder="Enter Password">
        <div class="error" id="loginError"></div>
        <button onclick="login()">Login</button>
        <p style="cursor:pointer;" onclick="resetPassword()">Forgot Password?</p>
    </div>
</div>

<div class="admin-panel" id="adminPanel">
    <div class="header">
        <h2>Admin Dashboard</h2>
        <div>
            <span id="sessionTimer">Session: 30:00</span>
            <span class="logout" onclick="logout()">Logout</span>
        </div>
    </div>

    <h3>Welcome Admin 👑</h3>
    <p>Your admin panel is working perfectly.</p>
</div>

<script>

// ================= CONFIG =================
const DEFAULT_PASSWORD = "8699223833";
const SESSION_TIMEOUT = 30 * 60 * 1000;

let sessionInterval;
let lastActivity = Date.now();

// ================= HASH FUNCTION =================
async function hashPassword(password){
    const encoder = new TextEncoder();
    const data = encoder.encode(password);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b=>b.toString(16).padStart(2,"0")).join("");
}

// ================= INIT STORAGE =================
async function initStorage(){
    if(!localStorage.getItem("passwordHash")){
        const hash = await hashPassword(DEFAULT_PASSWORD);
        localStorage.setItem("passwordHash", hash);
    }
}
initStorage();

// ================= LOGIN =================
async function login(){
    const pass = document.getElementById("passwordInput").value;
    const storedHash = localStorage.getItem("passwordHash");
    const hash = await hashPassword(pass);

    if(hash === storedHash){
        document.getElementById("loginOverlay").style.display="none";
        document.getElementById("adminPanel").style.display="block";
        startSession();
    }else{
        document.getElementById("loginError").innerText="Incorrect Password";
    }
}

// ================= RESET PASSWORD =================
async function resetPassword(){
    const newPass = prompt("Enter new password:");
    if(!newPass) return;

    const hash = await hashPassword(newPass);
    localStorage.setItem("passwordHash", hash);
    alert("Password Updated!");
}

// ================= SESSION =================
function startSession(){
    updateTimer();
    sessionInterval = setInterval(()=>{
        if(Date.now() - lastActivity > SESSION_TIMEOUT){
            logout();
        }else{
            updateTimer();
        }
    },1000);

    document.addEventListener("click", ()=>lastActivity=Date.now());
    document.addEventListener("keydown", ()=>lastActivity=Date.now());
}

function updateTimer(){
    const remain = SESSION_TIMEOUT - (Date.now() - lastActivity);
    const mins = Math.floor(remain/60000);
    const secs = Math.floor((remain%60000)/1000);
    document.getElementById("sessionTimer").innerText =
        "Session: "+mins.toString().padStart(2,"0")+":"+
        secs.toString().padStart(2,"0");
}

function logout(){
    clearInterval(sessionInterval);
    document.getElementById("adminPanel").style.display="none";
    document.getElementById("loginOverlay").style.display="flex";
    document.getElementById("passwordInput").value="";
}

</script>

</body>
</html>
