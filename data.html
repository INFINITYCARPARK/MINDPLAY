    <!-- Login Overlay (modified for email/password) -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2><i class="fas fa-lock"></i> Admin Login</h2>
            <input type="email" id="emailInput" placeholder="Email" required>
            <input type="password" id="passwordInput" placeholder="Password" required>
            <div class="checkbox-container">
                <input type="checkbox" id="rememberMe"> <label for="rememberMe">Remember me (stay logged in)</label>
            </div>
            <div class="error-msg" id="loginError"></div>
            <button class="login-btn" id="loginBtn" onclick="login()">Login</button>

    <!-- Admin Panel -->

        <header class="admin-header">

        </header>
        <!-- Rest of admin panel (tabs, forms, lists) exactly as before -->
        <!-- I'm not repeating all HTML here to keep answer concise, but you must copy the entire admin panel structure from the previous `data.html` (the one with Firebase database) and paste it here, between the header and footer. -->
        <!-- Make sure to include all panels: projects, skills, components, circuits etc. -->
    </div>

    <script>
        // Check if user is already logged in (on page load)
        auth.onAuthStateChanged(user => {
            if (user) {
                // User is signed in
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('userEmail').innerText = user.email;
                loadDashboardData(); // Load data from Firebase
            } else {
                document.getElementById('loginOverlay').style.display = 'flex';
                document.getElementById('adminPanel').style.display = 'none';
            }
        });

        // Login function
        function login() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const remember = document.getElementById('rememberMe').checked;
            const errorDiv = document.getElementById('loginError');
            errorDiv.innerText = '';

            if (!email || !password) {
                errorDiv.innerText = 'Email and password required';
                return;
            }

            const persistence = remember ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION;
            auth.setPersistence(persistence).then(() => {
                return auth.signInWithEmailAndPassword(email, password);
            }).catch(error => {
                errorDiv.innerText = error.message;
            });
        }

        // Logout
        function logout() {
            auth.signOut();
        }
