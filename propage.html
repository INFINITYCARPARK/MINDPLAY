<!DOCTYPE html>
<html lang="pa-in">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindPlay • Component Info</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Same as circuit.html */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',sans-serif;
            background:#000;
            color:#e0e0e0;
            line-height:1.6;
        }
        :root {
            --bg-dark:#0a0a0a;
            --bg-card:#111;
            --border-dim:#333;
            --text-light:#fff;
            --text-dim:#aaa;
            --border-radius:20px;
        }
        .container { max-width:1200px; margin:0 auto; padding:2rem 5%; }
        .back-link {
            display:inline-block;
            margin-bottom:2rem;
            color:#aaa;
            text-decoration:none;
            border:1px solid #333;
            padding:0.5rem 1.5rem;
            border-radius:60px;
            transition:0.3s;
        }
        .back-link:hover { border-color:#fff; color:#fff; }
        .item-header {
            text-align:center;
            margin-bottom:3rem;
        }
        .item-header h1 {
            font-size:3rem;
            color:#fff;
            margin-bottom:1rem;
        }
        .section-title {
            font-size:2rem;
            font-weight:600;
            margin:2rem 0 1rem;
            color:#fff;
            border-bottom:1px solid #333;
            padding-bottom:0.5rem;
        }
        .description {
            background:#0a0a0a;
            padding:2rem;
            border-radius:var(--border-radius);
            border:1px solid #333;
        }
        .images-grid {
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
            gap:1.5rem;
            margin-top:1rem;
        }
        .images-grid img {
            width:100%;
            height:200px;
            object-fit:cover;
            border-radius:10px;
            border:1px solid #333;
        }
        .files-list {
            display:flex;
            flex-wrap:wrap;
            gap:1rem;
            margin-top:1rem;
        }
        .files-list a {
            background:#1a1a1a;
            border:1px solid #444;
            color:#ccc;
            padding:0.5rem 1rem;
            border-radius:10px;
            text-decoration:none;
            transition:0.3s;
        }
        .files-list a:hover { background:#333; border-color:#666; color:#fff; }
        .specs-list {
            background:#0a0a0a;
            padding:1.5rem;
            border-radius:var(--border-radius);
            border:1px solid #333;
            margin-top:1rem;
        }
        .spec-item {
            padding:0.8rem;
            border-bottom:1px solid #333;
            display:flex;
        }
        .spec-item:last-child { border-bottom:none; }
        .spec-name { font-weight:600; color:#fff; min-width:150px; }
        .spec-value { color:#aaa; }
        .not-found { text-align:center; color:#cc3333; font-size:1.5rem; margin-top:4rem; }
        @media (max-width:768px) {
            .item-header h1 { font-size:2rem; }
            .spec-item { flex-direction:column; gap:0.3rem; }
            .spec-name { min-width:auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
        <div id="component-details"></div>
    </div>

    <script>
        function getComponentById(id) {
            const components = JSON.parse(localStorage.getItem('mindplay_components')) || [];
            return components.find(c => c.id === id);
        }

        function renderComponent() {
            const urlParams = new URLSearchParams(window.location.search);
            const componentId = urlParams.get('id');
            const container = document.getElementById('component-details');
            if (!componentId) {
                container.innerHTML = '<div class="not-found">No component specified.</div>';
                return;
            }
            const component = getComponentById(componentId);
            if (!component) {
                container.innerHTML = '<div class="not-found">Component not found.</div>';
                return;
            }

            const imagesHtml = component.images && component.images.length ? `
                <div class="section-title">Images</div>
                <div class="images-grid">
                    ${component.images.map(img => `<img src="${img}" alt="Component image" loading="lazy">`).join('')}
                </div>
            ` : '';

            const filesHtml = component.files && component.files.length ? `
                <div class="section-title">Datasheets / Files</div>
                <div class="files-list">
                    ${component.files.map(file => `<a href="${file.url}" target="_blank"><i class="fas fa-file-pdf"></i> ${file.name}</a>`).join('')}
                </div>
            ` : '';

            const specsHtml = component.specs && component.specs.length ? `
                <div class="section-title">Specifications</div>
                <div class="specs-list">
                    ${component.specs.map(s => `
                        <div class="spec-item">
                            <span class="spec-name">${s.name}</span>
                            <span class="spec-value">${s.value}</span>
                        </div>
                    `).join('')}
                </div>
            ` : '';

            const html = `
                <div class="item-header">
                    <h1>${component.title}</h1>
                </div>
                <div class="section-title">Description</div>
                <div class="description">${component.description}</div>
                ${imagesHtml}
                ${filesHtml}
                ${specsHtml}
            `;
            container.innerHTML = html;
        }

        renderComponent();
    </script>
</body>
</html>
