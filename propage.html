<!DOCTYPE html>
<html lang="pa-in">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindPlay • Project Details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',sans-serif;
            background:#000;
            color:#e0e0e0;
            line-height:1.6;
        }
        :root {
            --bg-dark:#0a0a0a;
            --bg-card:#111;
            --border-dim:#333;
            --text-light:#fff;
            --text-dim:#aaa;
            --border-radius:20px;
        }
        .container { max-width:1200px; margin:0 auto; padding:2rem 5%; }
        .back-link {
            display:inline-block;
            margin-bottom:2rem;
            color:#aaa;
            text-decoration:none;
            border:1px solid #333;
            padding:0.5rem 1.5rem;
            border-radius:60px;
            transition:0.3s;
        }
        .back-link:hover { border-color:#fff; color:#fff; }
        .project-header { text-align:center; margin-bottom:3rem; }
        .project-header h1 { font-size:3rem; color:#fff; margin-bottom:1rem; }
        .tech-tags {
            display:flex;
            flex-wrap:wrap;
            gap:0.6rem;
            justify-content:center;
            margin:1rem 0;
        }
        .tech-tags span {
            background:#111;
            border:1px solid #444;
            color:#ccc;
            padding:0.3rem 1rem;
            border-radius:60px;
            font-size:0.9rem;
        }
        .project-links {
            display:flex;
            gap:1.5rem;
            justify-content:center;
            margin:2rem 0;
        }
        .project-links a { color:#aaa; font-size:1.5rem; transition:0.3s; }
        .project-links a:hover { color:#fff; transform:scale(1.1); }
        .section-title {
            font-size:2rem;
            font-weight:600;
            margin:2rem 0 1rem;
            color:#fff;
            border-bottom:1px solid #333;
            padding-bottom:0.5rem;
        }
        .description {
            background:#0a0a0a;
            padding:2rem;
            border-radius:var(--border-radius);
            border:1px solid #333;
        }
        .images-grid {
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
            gap:1.5rem;
            margin-top:1rem;
        }
        .images-grid img {
            width:100%;
            height:200px;
            object-fit:cover;
            border-radius:10px;
            border:1px solid #333;
        }
        .video-container {
            position:relative;
            padding-bottom:56.25%;
            height:0;
            overflow:hidden;
            border-radius:10px;
            margin-top:1rem;
        }
        .video-container iframe {
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            border:1px solid #333;
        }
        .code-files {
            display:flex;
            flex-wrap:wrap;
            gap:1rem;
            margin-top:1rem;
        }
        .code-files a {
            background:#1a1a1a;
            border:1px solid #444;
            color:#ccc;
            padding:0.5rem 1rem;
            border-radius:10px;
            text-decoration:none;
            transition:0.3s;
        }
        .code-files a:hover { background:#333; border-color:#666; color:#fff; }
        .components-list, .build-steps {
            background:#0a0a0a;
            padding:1.5rem;
            border-radius:var(--border-radius);
            border:1px solid #333;
            margin-top:1rem;
        }
        .component-item, .step-item {
            padding:1rem;
            border-bottom:1px solid #333;
            display:flex;
            gap:1rem;
        }
        .component-item:last-child, .step-item:last-child { border-bottom:none; }
        .component-name { font-weight:600; color:#fff; min-width:150px; }
        .component-desc { color:#aaa; }
        .step-number { color:#666; font-weight:700; margin-right:1rem; }
        .not-found { text-align:center; color:#cc3333; font-size:1.5rem; margin-top:4rem; }
        @media (max-width:768px) {
            .project-header h1 { font-size:2rem; }
            .component-item { flex-direction:column; gap:0.3rem; }
            .component-name { min-width:auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
        <div id="project-details"></div>
    </div>

    <script>
        function getProjectById(id) {
            const projects = JSON.parse(localStorage.getItem('mindplay_projects')) || [];
            return projects.find(p => p.id === id);
        }

        function renderProject() {
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');
            const container = document.getElementById('project-details');
            if (!projectId) {
                container.innerHTML = '<div class="not-found">No project specified.</div>';
                return;
            }
            const project = getProjectById(projectId);
            if (!project) {
                container.innerHTML = '<div class="not-found">Project not found.</div>';
                return;
            }

            const imagesHtml = project.images && project.images.length ? `
                <div class="section-title">Images</div>
                <div class="images-grid">
                    ${project.images.map(img => `<img src="${img}" alt="Project image" loading="lazy">`).join('')}
                </div>
            ` : '';

            const videoHtml = project.video ? `
                <div class="section-title">Video Demo</div>
                <div class="video-container">
                    <iframe src="${project.video}" frameborder="0" allowfullscreen></iframe>
                </div>
            ` : '';

            const codeFilesHtml = project.codeFiles && project.codeFiles.length ? `
                <div class="section-title">Code Files</div>
                <div class="code-files">
                    ${project.codeFiles.map(file => `<a href="${file.url}" target="_blank"><i class="fas fa-file-code"></i> ${file.name}</a>`).join('')}
                </div>
            ` : '';

            const componentsHtml = project.components && project.components.length ? `
                <div class="section-title">Components Used</div>
                <div class="components-list">
                    ${project.components.map(c => `
                        <div class="component-item">
                            <span class="component-name">${c.name}</span>
                            <span class="component-desc">${c.description}</span>
                        </div>
                    `).join('')}
                </div>
            ` : '';

            const buildStepsHtml = project.buildSteps && project.buildSteps.length ? `
                <div class="section-title">How to Build</div>
                <div class="build-steps">
                    ${project.buildSteps.map((step, idx) => `
                        <div class="step-item">
                            <span class="step-number">${idx+1}.</span>
                            <span class="step-desc">${step}</span>
                        </div>
                    `).join('')}
                </div>
            ` : '';

            const html = `
                <div class="project-header">
                    <h1>${project.title}</h1>
                    <div class="tech-tags">${(project.tech || []).map(t => `<span>${t}</span>`).join('')}</div>
                    <div class="project-links">
                        ${project.github ? `<a href="${project.github}" target="_blank"><i class="fab fa-github"></i></a>` : ''}
                        ${project.link ? `<a href="${project.link}" target="_blank"><i class="fas fa-external-link-alt"></i></a>` : ''}
                    </div>
                </div>
                <div class="section-title">Description</div>
                <div class="description">${project.description}</div>
                ${imagesHtml}
                ${videoHtml}
                ${codeFilesHtml}
                ${componentsHtml}
                ${buildStepsHtml}
            `;
            container.innerHTML = html;
        }

        renderProject();
    </script>
</body>
</html>
