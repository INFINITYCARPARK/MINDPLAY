<!DOCTYPE html>
<html lang="pa-in">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindPlay • Circuits Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB8a1nVXO7HCFl7e4OTSP4UwZAu6kblnHM",
            authDomain: "mindplayx.firebaseapp.com",
            databaseURL: "https://mindplayx-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mindplayx",
            storageBucket: "mindplayx.firebasestorage.app",
            messagingSenderId: "414997999389",
            appId: "1:414997999389:web:c998a27c82afc1f65e7bf4",
            measurementId: "G-44CYEMLRP1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    </script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#000; color:#e0e0e0; line-height:1.6; }
        :root {
            --bg-dark:#0a0a0a;
            --bg-card:#111;
            --border-dim:#333;
            --text-light:#fff;
            --text-dim:#aaa;
            --border-radius:20px;
            --transition:all 0.3s ease;
        }
        .container { max-width:1300px; margin:0 auto; padding:2rem 5%; }
        .back-link {
            display:inline-block; margin-bottom:2rem; color:#aaa; text-decoration:none;
            border:1px solid #333; padding:0.5rem 1.5rem; border-radius:60px; transition:0.3s;
        }
        .back-link:hover { border-color:#fff; color:#fff; }
        h1 { font-size:2.5rem; color:#fff; margin-bottom:2rem; text-align:center; border-bottom:1px solid #333; padding-bottom:1rem; }
        .search-container {
            max-width:600px; margin:0 auto 2rem;
        }
        .search-input {
            width:100%; padding:1rem 1.5rem; background:#0a0a0a; border:1px solid #333;
            border-radius:60px; color:#fff; font-size:1rem; transition:var(--transition);
        }
        .search-input:focus { outline:none; border-color:#666; background:#111; }
        .circuits-grid {
            display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
            gap:2rem; margin-top:2rem;
        }
        .circuit-card {
            background:#0a0a0a; border-radius:var(--border-radius); overflow:hidden;
            border:1px solid #222; transition:var(--transition); display:flex; flex-direction:column;
            cursor:pointer;
        }
        .circuit-card:hover { transform:translateY(-6px); border-color:#444; box-shadow:0 15px 30px rgba(0,0,0,0.8); }
        .circuit-img {
            height:200px; background:#111; display:flex; align-items:center; justify-content:center;
        }
        .circuit-img img { width:100%; height:100%; object-fit:cover; }
        .circuit-img i { font-size:4rem; color:#333; }
        .circuit-info { padding:1.5rem; flex:1; }
        .circuit-info h3 { font-size:1.4rem; margin-bottom:0.5rem; color:#fff; }
        .circuit-description { color:#aaa; font-size:0.95rem; margin-bottom:0.8rem; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
        .circuit-components { display:flex; flex-wrap:wrap; gap:0.5rem; margin:0.5rem 0; }
        .circuit-components span { background:#111; border:1px solid #333; color:#ccc; padding:0.2rem 0.8rem; border-radius:50px; font-size:0.75rem; }
        .no-circuits { text-align:center; color:#666; font-size:1.2rem; padding:3rem; grid-column:1/-1; }
        footer { text-align:center; padding:2rem 5%; border-top:1px solid #222; color:#666; margin-top:3rem; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
        <h1><i class="fas fa-microchip"></i> Circuits Gallery</h1>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Search circuits by name, components, difficulty...">
        </div>
        <div id="circuitsGrid" class="circuits-grid"></div>
    </div>
    <footer>
        <p>© 2025 Tejinder Singh Gill • Circuit Designs</p>
    </footer>

    <script>
        let circuits = [];
        let currentFilter = '';

        function loadCircuits() {
            db.ref('circuits').on('value', (snapshot) => {
                const data = snapshot.val();
                circuits = data ? Object.keys(data).map(key => ({ firebaseKey: key, ...data[key] })) : [];
                renderCircuits();
            });
        }

        function renderCircuits() {
            const grid = document.getElementById('circuitsGrid');
            const filtered = circuits.filter(c => {
                const search = currentFilter.toLowerCase();
                return (c.name && c.name.toLowerCase().includes(search)) ||
                       (c.description && c.description.toLowerCase().includes(search)) ||
                       (c.difficulty && c.difficulty.toLowerCase().includes(search)) ||
                       (c.componentsUsed && c.componentsUsed.some(comp => 
                           (typeof comp === 'string' && comp.toLowerCase().includes(search)) ||
                           (comp.name && comp.name.toLowerCase().includes(search))
                       ));
            });
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-circuits">🔍 No circuits found.</div>';
                return;
            }
            grid.innerHTML = filtered.map(c => `
                <div class="circuit-card" data-id="${c.firebaseKey}">
                    <div class="circuit-img">
                        ${c.image ? `<img src="${c.image}" alt="${c.name}">` : '<i class="fas fa-microchip"></i>'}
                    </div>
                    <div class="circuit-info">
                        <h3>${c.name}</h3>
                        <div class="circuit-description">${c.description || 'No description'}</div>
                        <div class="circuit-components">${(c.componentsUsed || []).map(comp => `<span>${comp.name || comp}</span>`).join('')}</div>
                        ${c.difficulty ? `<div style="color:#666; margin-top:0.5rem;">Difficulty: ${c.difficulty}</div>` : ''}
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('.circuit-card').forEach(card => {
                card.addEventListener('click', () => {
                    window.location.href = `circuitpage.html?id=${card.dataset.id}`;
                });
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentFilter = e.target.value;
            renderCircuits();
        });

        loadCircuits();
    </script>
</body>
</html>
