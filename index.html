<!DOCTYPE html>
<html lang="pa-in">
<head>
    <meta charset="UTF-8">
    <!-- Responsive viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>MindPlay - Tejinder Singh Gill | Robotics Portfolio</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="Tejinder Singh Gill (GT) ਦਾ Robotics Portfolio। Hilax Computer Centre ਵਿਖੇ ਸਿੱਖਦਾ ਹੋਇਆ, ਆਪਣੇ ਪ੍ਰੋਜੈਕਟ ਦਿਖਾਉਂਦਾ ਹੈ।">
    <meta name="keywords" content="Robotics, Arduino, Python, C++, MindPlay, Hilax, Punjab, India, Tejinder Singh Gill">
    <meta name="author" content="Tejinder Singh Gill (GT)">
    <meta name="robots" content="index, follow">
    <!-- Open Graph -->
    <meta property="og:title" content="MindPlay - Robotics Portfolio">
    <meta property="og:description" content="Tejinder Singh Gill ਦੇ Robotics ਪ੍ਰੋਜੈਕਟ ਦੇਖੋ ਅਤੇ ਸੰਪਰਕ ਕਰੋ।">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourusername.github.io">
    <meta property="og:image" content="https://yourusername.github.io/og-image.jpg">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ---------- RESET & VARIABLES ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Custom scrollbar (optional) */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #00ff9d; border-radius: 10px; }

        html {
            scroll-behavior: smooth;
        }

        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #1a1a1a;
            --neon-green: #00ff9d;
            --neon-magenta: #ff00ff;
            --text-light: #ffffff;
            --text-dim: #b0b0b0;
            --spacing-sm: clamp(0.5rem, 2vw, 1rem);
            --spacing-md: clamp(1rem, 4vw, 2rem);
            --spacing-lg: clamp(2rem, 6vw, 4rem);
            --font-size-base: clamp(0.9rem, 2.5vw, 1rem);
            --font-size-h1: clamp(2rem, 8vw, 3.5rem);
            --font-size-h2: clamp(1.8rem, 6vw, 2.5rem);
            --border-radius: 20px;
        }

        /* ---------- NAVBAR ---------- */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-sm) 5%;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 255, 157, 0.3);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .navbar.scrolled {
            padding: 0.5rem 5%;
            background: rgba(10, 10, 10, 0.95);
            box-shadow: 0 5px 20px rgba(0, 255, 157, 0.2);
        }

        .logo {
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: 700;
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(0, 255, 157, 0.5);
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: clamp(1rem, 3vw, 2rem);
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            font-size: clamp(0.8rem, 2vw, 1rem);
            transition: 0.3s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0%;
            height: 2px;
            background: var(--neon-green);
            transition: width 0.3s;
            box-shadow: 0 0 8px var(--neon-green);
        }

        .nav-links a:hover { color: var(--neon-green); }
        .nav-links a:hover::after { width: 100%; }

        /* ---------- HERO SECTION ---------- */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 6rem 5% 4rem;
            position: relative;
            overflow: hidden;
            flex-wrap: wrap;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -10%;
            width: min(600px, 80vw);
            height: min(600px, 80vw);
            background: radial-gradient(circle, rgba(0,255,157,0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            animation: glowPulse 8s infinite alternate;
        }

        @keyframes glowPulse {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .hero-content {
            flex: 1 1 300px;
            z-index: 2;
            max-width: 700px;
        }

        .hero-content h1 {
            font-size: var(--font-size-h1);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        .hero-content h1 .name {
            color: var(--neon-green);
            text-shadow: 0 0 15px rgba(0, 255, 157, 0.7);
            display: inline-block;
            animation: flicker 3s infinite;
        }

        @keyframes flicker {
            0%,19%,21%,23%,25%,54%,56%,100% { opacity: 1; }
            20%,24%,55% { opacity: 0.3; }
        }

        .hero-content .tagline {
            font-size: clamp(1rem, 3vw, 1.2rem);
            color: var(--text-dim);
            margin-bottom: 1rem;
        }

        .hero-content .info-row {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(1rem, 3vw, 2rem);
            margin: 1.5rem 0;
            background: rgba(255,255,255,0.03);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: 50px;
            border: 1px solid rgba(0,255,157,0.2);
            backdrop-filter: blur(4px);
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-light);
            font-size: var(--font-size-base);
        }

        .info-item i {
            color: var(--neon-green);
            font-size: 1.2rem;
        }

        .cta-buttons {
            display: flex;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.8rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--neon-green);
            color: #0a0a0a;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.5);
        }

        .btn-primary:hover {
            background: transparent;
            color: var(--neon-green);
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.8), inset 0 0 10px rgba(0, 255, 157, 0.3);
            transform: translateY(-3px);
        }

        .btn-outline {
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            background: transparent;
        }

        .btn-outline:hover {
            background: var(--neon-green);
            color: #0a0a0a;
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.8);
            transform: translateY(-3px);
        }

        .hero-graphic {
            flex: 1 1 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .hero-graphic i {
            font-size: clamp(8rem, 20vw, 15rem);
            color: var(--neon-green);
            filter: drop-shadow(0 0 30px rgba(0, 255, 157, 0.8));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%,100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* ---------- SECTIONS ---------- */
        section {
            padding: var(--spacing-lg) 5%;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s, transform 0.8s;
        }

        section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section-title {
            text-align: center;
            font-size: var(--font-size-h2);
            margin-bottom: var(--spacing-lg);
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--neon-green), transparent);
        }

        /* ---------- SEARCH BAR ---------- */
        .search-container {
            max-width: 600px;
            margin: var(--spacing-md) auto;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-input {
            flex: 1 1 200px;
            padding: 0.9rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,255,157,0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            min-width: 200px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 20px rgba(0,255,157,0.3);
        }

        .search-btn {
            padding: 0.9rem 2rem;
            background: var(--neon-green);
            color: #0a0a0a;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }

        .search-btn:hover {
            background: transparent;
            color: var(--neon-green);
            box-shadow: 0 0 30px rgba(0,255,157,0.5);
        }

        /* ---------- PROJECTS GRID ---------- */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(280px, 100%), 1fr));
            gap: var(--spacing-md);
            margin-top: var(--spacing-md);
        }

        .project-card {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            overflow: hidden;
            border: 1px solid rgba(0, 255, 157, 0.2);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .project-card:hover {
            transform: translateY(-10px);
            border-color: var(--neon-green);
            box-shadow: 0 20px 40px rgba(0,255,157,0.2), 0 0 0 2px rgba(0,255,157,0.1);
        }

        .project-img {
            height: 200px;
            background: linear-gradient(145deg,#2a2a2a,#1a1a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .project-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .project-card:hover .project-img img {
            transform: scale(1.05);
        }

        .project-img i {
            font-size: 4rem;
            color: var(--neon-green);
            opacity: 0.8;
        }

        .project-info {
            padding: var(--spacing-md);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .project-info h3 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            color: var(--neon-green);
            word-wrap: break-word;
        }

        .project-description {
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 0.5rem;
            word-wrap: break-word;
        }

        .project-description.collapsed {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .see-more-btn {
            background: none;
            border: none;
            color: var(--neon-green);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0;
            margin-bottom: 0.5rem;
            text-align: left;
            transition: 0.3s;
        }

        .see-more-btn:hover {
            color: var(--neon-magenta);
            text-decoration: underline;
        }

        .tech-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.5rem 0 1rem;
        }

        .tech-tags span {
            background: rgba(0,255,157,0.1);
            border: 1px solid rgba(0,255,157,0.3);
            color: var(--neon-green);
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 500;
            transition: 0.3s;
            word-break: break-word;
        }

        .tech-tags span:hover {
            background: var(--neon-green);
            color: #0a0a0a;
        }

        .project-links {
            display: flex;
            gap: 1rem;
            margin-top: auto;
        }

        .project-links a {
            color: var(--neon-green);
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .project-links a:hover {
            color: var(--neon-magenta);
            transform: scale(1.2);
        }

        /* ---------- SKILLS ---------- */
        .skills-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: var(--spacing-md);
            max-width: 900px;
            margin: 0 auto;
        }

        .skill-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100px;
            flex: 0 1 100px;
        }

        .skill-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.8rem;
            border: 2px solid rgba(0,255,157,0.3);
            box-shadow: 0 0 20px rgba(0,255,157,0.2);
            transition: 0.3s;
        }

        .skill-item:hover .skill-circle {
            border-color: var(--neon-green);
            box-shadow: 0 0 30px var(--neon-green);
            transform: scale(1.05);
        }

        .skill-circle i {
            font-size: 2.5rem;
            color: var(--neon-green);
        }

        .skill-item span {
            font-weight: 500;
            color: var(--text-dim);
            text-align: center;
            font-size: 0.9rem;
        }

        /* ---------- CONTACT ---------- */
        .contact-container {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-lg);
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: var(--spacing-lg);
            border: 1px solid rgba(0,255,157,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .contact-info {
            flex: 1 1 250px;
        }

        .contact-info h3 {
            font-size: clamp(1.8rem, 5vw, 2rem);
            margin-bottom: 1rem;
            color: var(--neon-green);
        }

        .contact-info p {
            color: var(--text-dim);
            margin-bottom: 1.5rem;
            font-size: var(--font-size-base);
        }

        .social-links {
            display: flex;
            gap: 1.2rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .social-links a {
            color: var(--text-light);
            font-size: 1.8rem;
            transition: 0.3s;
        }

        .social-links a:hover {
            color: var(--neon-green);
            transform: translateY(-5px);
            filter: drop-shadow(0 0 10px var(--neon-green));
        }

        .contact-form {
            flex: 2 1 300px;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.9rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,255,157,0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(0,255,157,0.3);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            background: var(--neon-green);
            color: #0a0a0a;
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(0,255,157,0.3);
        }

        .submit-btn:hover {
            background: transparent;
            color: var(--neon-green);
            box-shadow: 0 0 30px rgba(0,255,157,0.6);
        }

        /* ---------- FOOTER ---------- */
        footer {
            text-align: center;
            padding: var(--spacing-md);
            border-top: 1px solid rgba(0,255,157,0.2);
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .no-projects {
            text-align: center;
            color: var(--text-dim);
            font-size: 1.2rem;
            padding: var(--spacing-lg);
            grid-column: 1 / -1;
        }

        /* ---------- RESPONSIVE TWEAKS ---------- */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 0.5rem;
                padding: 0.5rem 3%;
            }
            .nav-links {
                gap: 1rem;
            }
            .hero {
                padding-top: 8rem;
                text-align: center;
            }
            .hero-content .info-row {
                justify-content: center;
            }
            .cta-buttons {
                justify-content: center;
            }
            .search-container {
                flex-direction: column;
                align-items: stretch;
            }
            .search-btn {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 1.5rem;
            }
            .nav-links a {
                font-size: 0.8rem;
            }
            .hero-content h1 {
                font-size: 1.8rem;
            }
            .skill-item {
                width: 80px;
            }
            .skill-circle {
                width: 70px;
                height: 70px;
            }
            .skill-circle i {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="logo">MindPlay</div>
        <div class="nav-links">
            <a href="#home">Home</a>
            <a href="#projects">Projects</a>
            <a href="#skills">Skills</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <section class="hero" id="home">
        <div class="hero-content" id="heroContent"></div>
        <div class="hero-graphic"><i class="fas fa-robot"></i></div>
    </section>

    <section id="projects">
        <h2 class="section-title">My Robotics Projects</h2>
        <div class="search-container">
            <input type="text" class="search-input" id="projectSearch" placeholder="Search projects..." onkeyup="filterProjects()">
            <button class="search-btn" onclick="filterProjects()"><i class="fas fa-search"></i> Search</button>
        </div>
        <div class="projects-grid" id="projectsContainer"></div>
    </section>

    <section id="skills">
        <h2 class="section-title">Skills I'm Developing</h2>
        <div class="skills-container" id="skillsContainer"></div>
    </section>

    <section id="contact">
        <h2 class="section-title">Get In Touch</h2>
        <div class="contact-container">
            <div class="contact-info">
                <h3>Let's connect</h3>
                <p>I'm always excited to discuss robotics, learning, or collaboration. Feel free to reach out!</p>
                <div class="social-links">
                    <a href="#"><i class="fab fa-github"></i></a>
                    <a href="#"><i class="fab fa-linkedin"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-youtube"></i></a>
                </div>
            </div>
            <div class="contact-form">
                <form id="contactForm">
                    <div class="form-group"><input type="text" placeholder="Your Name" required></div>
                    <div class="form-group"><input type="email" placeholder="Your Email" required></div>
                    <div class="form-group"><textarea placeholder="Your Message" required></textarea></div>
                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <footer id="footerText"></footer>

    <script>
        // Intersection Observer for scroll animations
        const sections = document.querySelectorAll('section');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });
        sections.forEach(section => observer.observe(section));

        // Navbar scroll effect
        window.addEventListener('scroll', function() {
            document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
        });

        // Contact form demo
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Thanks for your message, ' + this.querySelector('input[type="text"]').value + '! (Demo)');
            this.reset();
        });

        // Load profile from localStorage
        function loadProfile() {
            const profile = JSON.parse(localStorage.getItem('mindplay_profile')) || {
                name: 'Tejinder Singh Gill',
                shortName: 'GT',
                center: 'Hilax Computer Centre',
                location: 'Punjab, India'
            };
            document.getElementById('heroContent').innerHTML = `
                <h1>Hi, I'm <span class="name">${profile.name}</span> (${profile.shortName})</h1>
                <p class="tagline">Aspiring Robotics Engineer | Learning at ${profile.center}</p>
                <div class="info-row">
                    <div class="info-item"><i class="fas fa-laptop-code"></i> <span>${profile.center}</span></div>
                    <div class="info-item"><i class="fas fa-map-marker-alt"></i> <span>${profile.location}</span></div>
                    <div class="info-item"><i class="fas fa-brain"></i> <span>MindPlay</span></div>
                </div>
                <p class="tagline" style="margin:1.5rem 0;">Building robots, one line of code at a time. Explore my learning journey and projects.</p>
                <div class="cta-buttons">
                    <a href="#projects" class="btn btn-primary">View Projects</a>
                    <a href="#contact" class="btn btn-outline">Contact Me</a>
                </div>
            `;
            document.getElementById('footerText').innerHTML = `© 2025 ${profile.name} (${profile.shortName}) | Learning at ${profile.center} | MindPlay`;
        }

        // Load skills
        const defaultSkills = [
            { name: 'Arduino', icon: 'fa-microchip' },
            { name: 'Robotics', icon: 'fa-robot' },
            { name: 'Python', icon: 'fa-python' },
            { name: 'C/C++', icon: 'fa-code' },
            { name: '3D Design', icon: 'fa-drafting-compass' },
            { name: 'Circuits', icon: 'fa-bolt' }
        ];

        function loadSkills() {
            let skills = JSON.parse(localStorage.getItem('mindplay_skills'));
            if (!skills || skills.length === 0) skills = defaultSkills;
            const container = document.getElementById('skillsContainer');
            let html = '';
            skills.forEach(s => {
                html += `<div class="skill-item"><div class="skill-circle"><i class="fas ${s.icon}"></i></div><span>${s.name}</span></div>`;
            });
            container.innerHTML = html;
        }

        // Load and filter projects
        let allProjects = [];

        function loadProjects() {
            allProjects = JSON.parse(localStorage.getItem('mindplay_projects')) || [];
            renderProjects(allProjects);
        }

        function renderProjects(projects) {
            const container = document.getElementById('projectsContainer');
            if (projects.length === 0) {
                container.innerHTML = '<div class="no-projects">No projects yet.</div>';
                return;
            }
            let html = '';
            projects.forEach((p, idx) => {
                const img = p.image ? `<img src="${p.image}" alt="${p.title}">` : '<i class="fas fa-robot"></i>';
                const tags = p.tags ? p.tags.split(',').map(t => `<span>${t.trim()}</span>`).join('') : '';
                const links = `<div class="project-links">${p.video ? `<a href="${p.video}" target="_blank" title="Video"><i class="fas fa-video"></i></a>` : ''}${p.code ? `<a href="${p.code}" target="_blank" title="Code"><i class="fas fa-code"></i></a>` : ''}</div>`;
                html += `
                    <div class="project-card">
                        <div class="project-img">${img}</div>
                        <div class="project-info">
                            <h3>${p.title}</h3>
                            <div class="project-description collapsed" id="desc-${idx}">${p.description}</div>
                            <button class="see-more-btn" onclick="toggleDesc(${idx})" id="btn-${idx}">See More</button>
                            <div class="tech-tags">${tags}</div>
                            ${links}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        window.toggleDesc = function(idx) {
            const desc = document.getElementById(`desc-${idx}`);
            const btn = document.getElementById(`btn-${idx}`);
            if (desc.classList.contains('collapsed')) {
                desc.classList.remove('collapsed');
                btn.innerText = 'See Less';
            } else {
                desc.classList.add('collapsed');
                btn.innerText = 'See More';
            }
        };

        function filterProjects() {
            const term = document.getElementById('projectSearch').value.toLowerCase();
            if (!term) {
                renderProjects(allProjects);
                return;
            }
            const filtered = allProjects.filter(p => 
                p.title.toLowerCase().includes(term) ||
                p.description.toLowerCase().includes(term) ||
                (p.tags && p.tags.toLowerCase().includes(term))
            );
            renderProjects(filtered);
        }

        // Load all data
        function loadAll() {
            loadProfile();
            loadSkills();
            loadProjects();
        }
        window.addEventListener('load', loadAll);
        window.addEventListener('focus', loadAll);
    </script>
</body>
</html>
