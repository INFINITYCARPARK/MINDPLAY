<!DOCTYPE html>
<html lang="pa-in">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindPlay • Circuit Design</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Same styles as propage.html, adjust as needed */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',sans-serif;
            background:#000;
            color:#e0e0e0;
            line-height:1.6;
        }
        :root {
            --bg-dark:#0a0a0a;
            --bg-card:#111;
            --border-dim:#333;
            --text-light:#fff;
            --text-dim:#aaa;
            --border-radius:20px;
        }
        .container { max-width:1200px; margin:0 auto; padding:2rem 5%; }
        .back-link {
            display:inline-block;
            margin-bottom:2rem;
            color:#aaa;
            text-decoration:none;
            border:1px solid #333;
            padding:0.5rem 1.5rem;
            border-radius:60px;
            transition:0.3s;
        }
        .back-link:hover { border-color:#fff; color:#fff; }
        .item-header {
            text-align:center;
            margin-bottom:3rem;
        }
        .item-header h1 {
            font-size:3rem;
            color:#fff;
            margin-bottom:1rem;
        }
        .section-title {
            font-size:2rem;
            font-weight:600;
            margin:2rem 0 1rem;
            color:#fff;
            border-bottom:1px solid #333;
            padding-bottom:0.5rem;
        }
        .description {
            background:#0a0a0a;
            padding:2rem;
            border-radius:var(--border-radius);
            border:1px solid #333;
        }
        .images-grid {
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
            gap:1.5rem;
            margin-top:1rem;
        }
        .images-grid img {
            width:100%;
            height:200px;
            object-fit:cover;
            border-radius:10px;
            border:1px solid #333;
        }
        .files-list {
            display:flex;
            flex-wrap:wrap;
            gap:1rem;
            margin-top:1rem;
        }
        .files-list a {
            background:#1a1a1a;
            border:1px solid #444;
            color:#ccc;
            padding:0.5rem 1rem;
            border-radius:10px;
            text-decoration:none;
            transition:0.3s;
        }
        .files-list a:hover { background:#333; border-color:#666; color:#fff; }
        .steps-list, .components-list {
            background:#0a0a0a;
            padding:1.5rem;
            border-radius:var(--border-radius);
            border:1px solid #333;
            margin-top:1rem;
        }
        .step-item, .component-item {
            padding:1rem;
            border-bottom:1px solid #333;
            display:flex;
            gap:1rem;
        }
        .step-item:last-child, .component-item:last-child { border-bottom:none; }
        .step-number { color:#666; font-weight:700; margin-right:1rem; }
        .component-name { font-weight:600; color:#fff; min-width:150px; }
        .component-desc { color:#aaa; }
        .not-found { text-align:center; color:#cc3333; font-size:1.5rem; margin-top:4rem; }
        @media (max-width:768px) {
            .item-header h1 { font-size:2rem; }
            .component-item { flex-direction:column; gap:0.3rem; }
            .component-name { min-width:auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
        <div id="circuit-details"></div>
    </div>

    <script>
        function getCircuitById(id) {
            const circuits = JSON.parse(localStorage.getItem('mindplay_circuits')) || [];
            return circuits.find(c => c.id === id);
        }

        function renderCircuit() {
            const urlParams = new URLSearchParams(window.location.search);
            const circuitId = urlParams.get('id');
            const container = document.getElementById('circuit-details');
            if (!circuitId) {
                container.innerHTML = '<div class="not-found">No circuit specified.</div>';
                return;
            }
            const circuit = getCircuitById(circuitId);
            if (!circuit) {
                container.innerHTML = '<div class="not-found">Circuit not found.</div>';
                return;
            }

            const imagesHtml = circuit.images && circuit.images.length ? `
                <div class="section-title">Images</div>
                <div class="images-grid">
                    ${circuit.images.map(img => `<img src="${img}" alt="Circuit image" loading="lazy">`).join('')}
                </div>
            ` : '';

            const filesHtml = circuit.files && circuit.files.length ? `
                <div class="section-title">Schematic / Files</div>
                <div class="files-list">
                    ${circuit.files.map(file => `<a href="${file.url}" target="_blank"><i class="fas fa-file-pdf"></i> ${file.name}</a>`).join('')}
                </div>
            ` : '';

            const componentsHtml = circuit.components && circuit.components.length ? `
                <div class="section-title">Components Used</div>
                <div class="components-list">
                    ${circuit.components.map(c => `
                        <div class="component-item">
                            <span class="component-name">${c.name}</span>
                            <span class="component-desc">${c.description}</span>
                        </div>
                    `).join('')}
                </div>
            ` : '';

            const stepsHtml = circuit.buildSteps && circuit.buildSteps.length ? `
                <div class="section-title">Design Steps</div>
                <div class="steps-list">
                    ${circuit.buildSteps.map((step, idx) => `
                        <div class="step-item">
                            <span class="step-number">${idx+1}.</span>
                            <span class="step-desc">${step}</span>
                        </div>
                    `).join('')}
                </div>
            ` : '';

            const html = `
                <div class="item-header">
                    <h1>${circuit.title}</h1>
                </div>
                <div class="section-title">Description</div>
                <div class="description">${circuit.description}</div>
                ${imagesHtml}
                ${filesHtml}
                ${componentsHtml}
                ${stepsHtml}
            `;
            container.innerHTML = html;
        }

        renderCircuit();
    </script>
</body>
</html>
