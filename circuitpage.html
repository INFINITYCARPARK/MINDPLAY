<!DOCTYPE html>
<html lang="pa-in">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindPlay • Circuit Details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB8a1nVXO7HCFl7e4OTSP4UwZAu6kblnHM",
            authDomain: "mindplayx.firebaseapp.com",
            databaseURL: "https://mindplayx-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mindplayx",
            storageBucket: "mindplayx.firebasestorage.app",
            messagingSenderId: "414997999389",
            appId: "1:414997999389:web:c998a27c82afc1f65e7bf4",
            measurementId: "G-44CYEMLRP1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    </script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',sans-serif;
            background:#000;
            color:#e0e0e0;
            line-height:1.6;
        }
        :root {
            --bg-dark:#0a0a0a;
            --bg-card:#111;
            --border-dim:#333;
            --text-light:#fff;
            --text-dim:#aaa;
            --border-radius:20px;
        }
        .container { max-width:1200px; margin:0 auto; padding:2rem 5%; }
        .back-link {
            display:inline-block;
            margin-bottom:2rem;
            color:#aaa;
            text-decoration:none;
            border:1px solid #333;
            padding:0.5rem 1.5rem;
            border-radius:60px;
            transition:0.3s;
        }
        .back-link:hover { border-color:#fff; color:#fff; }
        .circuit-header { text-align:center; margin-bottom:3rem; }
        .circuit-header h1 { font-size:3rem; color:#fff; margin-bottom:0.5rem; }
        .difficulty-badge {
            display:inline-block;
            background:#111;
            border:1px solid #444;
            color:#ccc;
            padding:0.3rem 1.5rem;
            border-radius:60px;
            font-size:0.9rem;
        }
        .circuit-image {
            text-align:center; margin:2rem 0;
        }
        .circuit-image img {
            max-width:100%; max-height:400px;
            border-radius:10px; border:1px solid #333;
        }
        .section-title {
            font-size:2rem;
            font-weight:600;
            margin:2rem 0 1rem;
            color:#fff;
            border-bottom:1px solid #333;
            padding-bottom:0.5rem;
        }
        .description {
            background:#0a0a0a;
            padding:2rem;
            border-radius:var(--border-radius);
            border:1px solid #333;
            line-height:1.8;
        }
        .links {
            display:flex;
            flex-wrap:wrap;
            gap:1rem;
            margin:1rem 0;
        }
        .links a {
            background:#1a1a1a;
            border:1px solid #444;
            color:#ccc;
            padding:0.5rem 1rem;
            border-radius:10px;
            text-decoration:none;
            transition:0.3s;
        }
        .links a:hover { background:#333; border-color:#666; color:#fff; }
        .components-table {
            width:100%;
            background:#0a0a0a;
            border-radius:var(--border-radius);
            border:1px solid #333;
            overflow:hidden;
        }
        .components-table table {
            width:100%;
            border-collapse:collapse;
        }
        .components-table th {
            background:#111;
            color:#ccc;
            font-weight:500;
            padding:1rem;
            text-align:left;
            border-bottom:1px solid #333;
        }
        .components-table td {
            padding:0.8rem 1rem;
            border-bottom:1px solid #333;
            color:#aaa;
        }
        .components-table tr:last-child td { border-bottom:none; }
        .notes {
            background:#0a0a0a;
            padding:1.5rem;
            border-radius:var(--border-radius);
            border:1px solid #333;
        }
        .not-found { text-align:center; color:#cc3333; font-size:1.5rem; margin-top:4rem; }
        footer { text-align:center; padding:2rem 5%; border-top:1px solid #222; color:#666; margin-top:3rem; }
    </style>
</head>
<body>
    <div class="container">
        <a href="circuit.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Circuits</a>
        <div id="circuit-details"></div>
    </div>
    <footer>
        <p>© 2025 Tejinder Singh Gill • Circuit Details</p>
    </footer>

    <script>
        function loadCircuit() {
            const urlParams = new URLSearchParams(window.location.search);
            const circuitKey = urlParams.get('id');
            const container = document.getElementById('circuit-details');
            if (!circuitKey) {
                container.innerHTML = '<div class="not-found">No circuit specified.</div>';
                return;
            }
            db.ref('circuits/' + circuitKey).get().then((snapshot) => {
                const circuit = snapshot.val();
                if (!circuit) {
                    container.innerHTML = '<div class="not-found">Circuit not found.</div>';
                    return;
                }
                renderCircuit(circuit);
            });
        }

        function renderCircuit(circuit) {
            const linksHtml = (circuit.pdf || circuit.code) ? `
                <div class="links">
                    ${circuit.pdf ? `<a href="${circuit.pdf}" target="_blank"><i class="fas fa-file-pdf"></i> Schematic PDF</a>` : ''}
                    ${circuit.code ? `<a href="${circuit.code}" target="_blank"><i class="fas fa-code"></i> Code</a>` : ''}
                </div>
            ` : '';

            const componentsHtml = circuit.componentsUsed && circuit.componentsUsed.length ? `
                <div class="section-title">Components List</div>
                <div class="components-table">
                    <table>
                        <thead><tr><th>Component</th><th>Quantity</th></tr></thead>
                        <tbody>
                            ${circuit.componentsUsed.map(comp => `
                                <tr><td>${comp.name || comp}</td><td>${comp.quantity || '1'}</td></tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            ` : '';

            const notesHtml = circuit.notes ? `
                <div class="section-title">Notes</div>
                <div class="notes">${circuit.notes}</div>
            ` : '';

            const html = `
                <div class="circuit-header">
                    <h1>${circuit.name}</h1>
                    ${circuit.difficulty ? `<span class="difficulty-badge">${circuit.difficulty}</span>` : ''}
                </div>

                ${circuit.image ? `
                    <div class="circuit-image">
                        <img src="${circuit.image}" alt="${circuit.name}">
                    </div>
                ` : ''}

                <div class="section-title">Description</div>
                <div class="description">${circuit.description || 'No description provided.'}</div>

                ${linksHtml}
                ${componentsHtml}
                ${notesHtml}
            `;
            document.getElementById('circuit-details').innerHTML = html;
        }

        loadCircuit();
    </script>
</body>
</html>
